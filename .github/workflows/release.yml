name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Sign APK with debug key
        run: |
          APKSIGNER=$(ls $ANDROID_SDK_ROOT/build-tools/*/apksigner | head -1)
          echo "Using apksigner: $APKSIGNER"
          $APKSIGNER sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --ks-key-alias androiddebugkey \
            app/build/outputs/apk/release/app-release-unsigned.apk

          # Rename for the release
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/JuiceRoll-${{ github.ref_name }}.apk

      - name: Build release AAB
        run: ./gradlew bundleRelease

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: JuiceRoll ${{ github.ref_name }}
          body: |
            ## JuiceRoll ${{ github.ref_name }}

            ### Downloads
            - **APK**: `JuiceRoll-${{ github.ref_name }}.apk` (install directly on device)
            - **AAB**: `JuiceRoll-${{ github.ref_name }}.aab` (for Google Play Store)

            ### Changelog
            See the commits since the previous release for details.
          files: |
            app/build/outputs/apk/release/JuiceRoll-${{ github.ref_name }}.apk
            app/build/outputs/bundle/release/app-release.aab
          fail_on_unmatched_files: true
