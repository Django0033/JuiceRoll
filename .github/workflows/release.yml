name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          mkdir -p app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore/release.jks

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: app/keystore/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build release AAB
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_PATH: app/keystore/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Sign APK (verify alignment)
        run: |
          # Verify APK is signed (build already signed it)
          $ANDROID_HOME/build-tools/*/apksigner verify app/build/outputs/apk/release/app-release-unsigned.apk || true
          ls -la app/build/outputs/apk/release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: JuiceRoll ${{ github.ref_name }}
          body: |
            ## JuiceRoll ${{ github.ref_name }}

            ### Downloads
            - **APK**: `JuiceRoll-${{ github.ref_name }}.apk` (install directly on device)
            - **AAB**: `JuiceRoll-${{ github.ref_name }}.aab` (for Google Play Store)

            ### Changelog
            See the commits since the previous release for details.
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          fail_on_unmatched_files: true
